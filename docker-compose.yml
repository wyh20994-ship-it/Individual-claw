version: "3.9"

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "3001:3001"
    env_file: .env
    depends_on:
      - runner
    restart: unless-stopped

  runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./runner/agent/skills:/app/runner/agent/skills   # 技能热重载
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data/memory/chroma:/chroma/chroma
    restart: unless-stopped
