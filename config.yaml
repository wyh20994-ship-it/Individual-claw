app:
  name: HangClaw
  version: "0.1.0"
  debug: false

gateway:
  host: "0.0.0.0"
  port: 3000
  ws_port: 3001
  channels:
    qq:
      enabled: true
      sandbox: true
    feishu:
      enabled: false
    dingtalk:
      enabled: false
  middleware:
    rate_limit:
      window_ms: 60000
      max_requests: 60
    auth:
      enabled: true

runner:
  ws_url: "ws://127.0.0.1:3001"
  llm:
    default_provider: deepseek
    default_model: deepseek-chat
    providers:
      deepseek:
        enabled: true
        max_tokens: 4096
        temperature: 0.7
      openai:
        enabled: false
        max_tokens: 4096
        temperature: 0.7
      claude:
        enabled: false
        max_tokens: 4096
        temperature: 0.7
      ollama:
        enabled: false
        default_model: qwen2.5:7b

  planner:
    enabled: false
    provider: deepseek
    model: deepseek-chat
    trigger_keywords:
      - "/规划"
      - "/plan"
      - "制定计划"
      - "分解任务"

  memory:
    conversation:
      backend: jsonl
      dir: "./runner/data/memory/conversation"
      max_turns: 50
    long_term:
      dir: "./runner/data/memory/long_term"
    agent_file: "./runner/data/memory/AGENT.md"
    index_file: "./runner/data/memory/MEMORY.md"
    extract_cron: "0 0 * * *"
    semantic:
      backend: chromadb
      collection: hangclaw_mem
      embedding_model: all-MiniLM-L6-v2
    working:
      backend: ttl_cache
      default_ttl: 3600

  tools:
    bash:
      enabled: true
      timeout: 30
      whitelist:
        - ls
        - cat
        - head
        - tail
        - wc
        - grep
        - find
        - echo
        - date
    file:
      enabled: true
      sandbox_path: "./runner/data/sandbox"
    http:
      enabled: true
      timeout: 15
    search:
      enabled: true
      provider: tavily

  skills:
    auto_reload: false
    directory: "./runner/agent/skills"

  sandbox:
    remote:
      enabled: false
      provider: "open_source_sdk"
      endpoint: "http://127.0.0.1:8080"
      sync_skills_on_start: true
      timeout: 30

services:
  pc_remote:
    enabled: false
    allowed_actions:
      - lock_screen
      - screenshot
      - list_processes
      - file_browse
  amap:
    enabled: false
  tavily_daily:
    enabled: false
    push_cron: "0 8 * * *"
